<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Button DOM Calculator</title>
    <script src="app3.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
body{
background: linear-gradient(135deg, #003566, #00f5d4);

}
 </style>
</head>

<body class="vh-100 d flex flex-column justify-content-center align-items-center">
    
    <div class="container" style="max-width:450px;">
        <div class="card shadow-ig p-4 bg-white">
            <h2 class="text-center mb-4 text-dark fw-bold">Multi-Button Calculator</h2>

    <!-- Input fields for the numbers -->
    <input type="text" id="num1" placeholder="First Number">
    <input type="text" id="num2" placeholder="Second Number">


    <br><br>

    <!-- Action Buttons -->
    <button id="addBtn">Add</button>
    <br>
    <button id="subBtn">Subtract</button>
    <br>
    <button id="mulBtn">Multiply</button>
    <br>
    <button id="divBtn">Divide</button>
    <br>
    <button id="clearBtn">Clear</button>


    <!-- Display area for the result -->
    <h1 id="resultText" style="font-weight: bold; margin-top: 15px;">Result: </h1>


    <!-- Link your JavaScript file here -->
    <script src="app3.js"></script>
</body>
</html>
